<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRJ-FO-GA-BE Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e26">
    <link rel="apple-touch-icon" href="assets/icon.svg">
</head>
<body class="login-page">
    <div id="login-container" class="login-container">
        <form id="login-form" class="login-card neu-raised">
            <h2>Welcome Back</h2>
            <p>Please login to your account</p>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            <div class="input-group" id="password-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <div class="input-group" id="otp-group" style="display: none;">
                <label for="otp">Authentication Code (OTP)</label>
                <p id="otp-instruction" style="margin-bottom: 10px;">Please enter the OTP provided by your administrator.</p>
                <input type="text" id="otp" name="otp" placeholder="Enter OTP from Admin">
                <a href="#" id="change-username-link" style="display: block; font-size: 0.8rem; margin-top: 15px; color: var(--accent-color); text-decoration: none; text-transform: uppercase; font-weight: 600;">Change Username</a>
            </div>
            <button type="submit" id="login-btn" class="primary">Login</button>
            <div id="message" class="message"></div>
        </form>
    </div>

    <div id="global-loader" class="global-loader">
        <div class="spinner"></div>
        <p id="loader-text">Loading...</p>
    </div>

    <script src="config.js"></script>
    <script src="app.js?v=1.2.3"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('Service Worker registered', reg);
                        // Force update if a new worker is found
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    window.location.reload();
                                }
                            };
                        };
                    })
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
    <div style="position: fixed; bottom: 10px; right: 15px; font-size: 0.7rem; color: var(--text-muted); opacity: 0.5; z-index: 10000;">v1.2.4</div>
    </body></html>
