<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRJ-FO-GA-BE Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="card login-card">
            <img src="https://trinitiland.com/wp-content/uploads/2022/10/7c4ce074ba092be0c80d3323b1041cda-2048x1858.png" alt="Logo" style="width: 120px; margin-bottom: 24px;">
            <h2 style="margin-bottom: 8px;">Welcome Back</h2>
            <p style="color: var(--text-secondary); margin-bottom: 32px; font-size: 0.875rem;">Sign in to manage defects</p>
            
            <div id="message" class="message" style="display: none; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.875rem;"></div>

            <form id="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
                </div>
                
                <div id="password-group" class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                </div>

                <div id="otp-group" class="input-group" style="display: none;">
                    <label for="otp">OTP Code</label>
                    <input type="text" id="otp" placeholder="Enter 6-digit code">
                    <a href="#" id="change-username-link" style="display: block; margin-top: 12px; font-size: 0.75rem; color: var(--primary-color); text-decoration: none;">Use different account?</a>
                </div>

                <button type="submit" id="login-btn" class="primary" style="width: 100%; height: 48px; font-size: 1rem;">Sign In</button>
            </form>
        </div>
    </div>

    <div id="global-loader">
        <div class="spinner-container">
            <div class="spinner-logo"></div>
        </div>
        <div class="slider-container">
            <div class="slider-bar"></div>
            <div class="slider-bar"></div>
            <div class="slider-bar"></div>
            <div class="slider-bar"></div>
            <div class="slider-bar"></div>
        </div>
        <p id="loader-text">Loading...</p>
    </div>

    <script src="libs/idb.js"></script>
    <script src="libs/utils.js"></script>
    <script src="config.js?v=1.9.5"></script>
    <script src="app.js?v=1.9.5"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    window.location.reload();
                                }
                            };
                        };
                    })
                    .catch(err => console.error('SW Error', err));
            });
        }
    </script>
</body>
</html>
