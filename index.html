<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRJ-FO-GA-BE Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#317EFB">
    <link rel="apple-touch-icon" href="assets/icon.svg">
</head>
<body>
    <div id="login-container" class="login-container">
        <form id="login-form" class="login-card">
            <h2>Welcome Back</h2>
            <p>Please login to your account</p>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" id="login-btn">Login</button>
            <div id="message" class="message"></div>
        </form>
    </div>

    <div id="dashboard-container" class="login-container" style="display: none;">
        <div class="login-card">
            <h2>Welcome, <span id="user-display">User</span>!</h2>
            <p>You are successfully logged in.</p>
            <button id="logout-btn" style="background-color: #f02849;">Logout</button>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
