<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defect Tracker - Floor Plan</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .floorplan-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            overflow: hidden;
            cursor: crosshair;
            border-radius: 15px;
        }
        #floorplan-img {
            width: 100%;
            display: block;
        }
        .pin {
            position: absolute;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 10;
            cursor: pointer;
        }
        #preview-img {
            max-width: 100%;
            margin-top: 15px;
            display: none;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <header>
        <span>Defect Tracker</span>
        <div style="display: flex; gap: 12px;">
            <button id="admin-btn" style="width: auto; padding: 8px 15px; font-size: 0.8rem;">Setup</button>
            <button id="sync-btn" class="success" style="width: auto; padding: 8px 15px; font-size: 0.8rem;">Sync to GA</button>
            <button id="back-btn" class="danger" style="width: auto; padding: 8px 15px; font-size: 0.8rem;">Back</button>
        </div>
    </header>

    <!-- Admin Setup Modal -->
    <div id="admin-modal" class="defect-modal">
        <div class="modal-content neu-raised" style="max-width: 600px; padding: 30px;">
            <h3>Project Setup</h3>
            <hr style="margin: 20px 0; border: none; border-top: 1px solid var(--shadow-light);">
            
            <div style="margin-bottom: 25px;">
                <h4>Add Unit Type</h4>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="text" id="new-unit-val" placeholder="ID (e.g. Type-D)">
                    <input type="text" id="new-unit-label" placeholder="Display Name">
                    <button id="add-unit-btn" class="primary" style="width: auto;">Add</button>
                </div>
            </div>

            <div style="margin-bottom: 25px;">
                <h4>Add Story / Floor</h4>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="text" id="new-story-val" list="common-stories" placeholder="ID (e.g. L4)">
                    <datalist id="common-stories">
                        <option value="Basement">
                        <option value="L1">
                        <option value="L2">
                        <option value="Rooftop">
                    </datalist>
                    <input type="text" id="new-story-label" placeholder="Display Name">
                    <button id="add-story-btn" class="primary" style="width: auto;">Add</button>
                </div>
            </div>

            <div style="margin-bottom: 25px;">
                <h4>Upload Floor Plan</h4>
                <p style="margin-bottom: 10px;">PNG recommended.</p>
                <input type="file" id="map-upload-input" accept="image/png">
                <button id="upload-map-btn" class="primary" style="width: auto; margin-top: 15px;">Upload to Drive</button>
            </div>

            <button id="close-admin-btn" style="margin-top: 10px;">Close</button>
        </div>
    </div>

    <div class="main-content">
        <div class="selectors neu-raised">
            <div class="input-group" style="flex: 1; min-width: 200px; margin-bottom: 0;">
                <label>Unit Type</label>
                <select id="unit-type-select"></select>
            </div>
            <div class="input-group" style="flex: 1; min-width: 200px; margin-bottom: 0;">
                <label>Story / Floor</label>
                <select id="story-select"></select>
            </div>
        </div>

        <div style="margin-bottom: 20px; text-align: center;">
            <h3 style="margin-bottom: 5px;">
                <span id="current-unit-display" style="color: var(--accent-color);">Type-A</span> 
                <span style="color: var(--text-muted); margin: 0 10px;">|</span> 
                <span id="current-floor-display" style="color: var(--accent-color);">L1</span>
            </h3>
            <p>Click on the map to log a new defect report.</p>
        </div>
        
        <div class="floorplan-container neu-inset" id="map-container">
            <img src="assets/floorplan-placeholder.png" id="floorplan-img" alt="Floor Plan">
            <div id="pins-container"></div>
        </div>
    </div>

    <!-- Defect Entry Modal -->
    <div id="defect-modal" class="defect-modal">
        <div class="modal-content neu-raised" style="padding: 30px;">
            <h3>New Defect Report</h3>
            <div class="input-group" style="margin-top: 20px;">
                <label>Description</label>
                <textarea id="defect-desc" rows="4" placeholder="Describe the issue..."></textarea>
            </div>
            <div class="input-group">
                <label>Attach Photo</label>
                <input type="file" id="defect-photo" accept="image/*" capture="environment">
                <img id="preview-img" alt="Preview">
            </div>
            <div style="display: flex; gap: 15px; margin-top: 10px;">
                <button id="save-defect-btn" class="success">Save Report</button>
                <button id="cancel-defect-btn" class="danger">Cancel</button>
            </div>
        </div>
    </div>

    <!-- View Detail Modal -->
    <div id="detail-modal" class="defect-modal">
        <div class="modal-content neu-raised" style="padding: 30px;">
            <h3>Defect Detail</h3>
            <div style="margin: 20px 0;">
                <p style="margin-bottom: 10px;"><strong style="color: var(--text-color);">Status:</strong> <span id="detail-status" style="color: var(--accent-color);"></span></p>
                <p><strong style="color: var(--text-color);">Description:</strong> <span id="detail-desc"></span></p>
            </div>
            <div id="detail-photo-container">
                <img id="detail-img" style="max-width: 100%; margin-top: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.4);" alt="Defect Photo">
            </div>
            <button id="close-detail-btn" class="primary" style="margin-top: 25px;">Close Detail</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <script src="config.js"></script>
    <script src="defect-logic.js"></script>
</body>
</html>
