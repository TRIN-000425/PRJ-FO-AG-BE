<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defect Tracker - Floor Plan</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .floorplan-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            border: 2px solid #ccc;
            overflow: hidden;
            cursor: crosshair;
        }
        #floorplan-img {
            width: 100%;
            display: block;
        }
        .pin {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: red;
            border-radius: 50%;
            border: 2px solid white;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .defect-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
        }
        #preview-img {
            max-width: 100%;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <header style="padding: 10px; background: #1877f2; color: white; display: flex; justify-content: space-between; align-items: center;">
        <span>Defect Tracker</span>
        <div style="display: flex; gap: 10px;">
            <button id="sync-btn" style="width: auto; padding: 5px 10px; background: #42b883; color: white; border: none; border-radius: 4px; cursor: pointer;">Sync to GA</button>
            <button id="back-btn" style="width: auto; padding: 5px 10px; background: #fff; color: #1877f2;">Back</button>
        </div>
    </header>

    <div class="main-content" style="padding: 20px;">
        <div class="selectors" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <div class="input-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
                <label>Unit Type</label>
                <select id="unit-type-select">
                    <option value="Type-A">Type A (Studio)</option>
                    <option value="Type-B">Type B (2-Bedroom)</option>
                    <option value="Type-C">Type C (Penthouse)</option>
                </select>
            </div>
            <div class="input-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
                <label>Story / Floor</label>
                <select id="story-select">
                    <option value="L1">Level 1</option>
                    <option value="L2">Level 2</option>
                    <option value="L3">Level 3</option>
                </select>
            </div>
        </div>

        <h3>Unit: <span id="current-unit-display">Type-A</span> | Floor: <span id="current-floor-display">L1</span></h3>
        <p>Click on the map to report a defect.</p>
        
        <div class="floorplan-container" id="map-container">
            <!-- Placeholder for your PNG floor plan -->
            <img src="assets/floorplan-placeholder.png" id="floorplan-img" alt="Floor Plan">
            <div id="pins-container"></div>
        </div>
    </div>

    <!-- Defect Entry Modal -->
    <div id="defect-modal" class="defect-modal">
        <div class="modal-content">
            <h3>New Defect</h3>
            <div class="input-group">
                <label>Description</label>
                <textarea id="defect-desc" rows="3" style="width: 100%; padding: 10px;"></textarea>
            </div>
            <div class="input-group">
                <label>Photo</label>
                <input type="file" id="defect-photo" accept="image/*" capture="environment">
                <img id="preview-img" alt="Preview">
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="save-defect-btn">Save Defect</button>
                <button id="cancel-defect-btn" style="background-color: #ccc;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="defect-logic.js"></script>
</body>
</html>
