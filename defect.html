<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defect Tracker - Floor Plan</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .floorplan-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            overflow: hidden;
            cursor: crosshair;
            border-radius: 15px;
        }
        #floorplan-img {
            width: 100%;
            display: block;
        }
        .pin {
            position: absolute;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 10;
            cursor: pointer;
        }
        #preview-img {
            max-width: 100%;
            margin-top: 15px;
            display: none;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span>New Defect Report</span>
            <div id="sync-indicator" style="width: 8px; height: 8px; border-radius: 50%; background: #ccc;" title="Sync Status"></div>
        </div>
        <div style="display: flex; gap: 12px;">
            <button id="sync-btn" class="primary" style="width: auto; padding: 8px 15px; font-size: 0.8rem;" title="Sync data to GA and check for app updates">Sync All (GA & App)</button>
            <button id="back-btn" class="danger" style="width: auto; padding: 8px 15px; font-size: 0.8rem;">Dashboard</button>
        </div>
    </header>

    <div class="main-content">
        <div class="selectors neu-raised">
            <div class="input-group" style="flex: 1; min-width: 200px; margin-bottom: 0;">
                <label>Unit Number</label>
                <select id="unit-number-select"></select>
            </div>
            <div class="input-group" style="flex: 1; min-width: 200px; margin-bottom: 0;">
                <label>Story / Floor</label>
                <select id="story-select"></select>
            </div>
        </div>

        <div style="margin-bottom: 20px; text-align: center;">
            <h3 style="margin-bottom: 5px;">
                <span id="current-unit-display" style="color: var(--accent-color);">Type-A</span> 
                <span style="color: var(--text-muted); margin: 0 10px;">|</span> 
                <span id="current-floor-display" style="color: var(--accent-color);">L1</span>
            </h3>
            <p>Click on the map to log a new defect report.</p>
        </div>
        
        <div class="floorplan-container neu-inset" id="map-container">
            <img src="assets/floorplan-placeholder.png" id="floorplan-img" alt="Floor Plan">
            <div id="pins-container"></div>
            <div id="active-crosshair" class="crosshair-pin pulse"></div>
        </div>
        
        <button id="confirm-pin-btn" class="primary neu-raised" style="display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: auto; padding: 15px 40px; z-index: 1000; font-weight: 800; letter-spacing: 2px;">Confirm Position</button>
    </div>

    <!-- Defect Entry Modal -->
    <div id="defect-modal" class="defect-modal">
        <div class="modal-content neu-raised" style="padding: 30px;">
            <h3>New Defect Report</h3>
            <div class="input-group" style="margin-top: 20px;">
                <label>Description</label>
                <textarea id="defect-desc" rows="4" placeholder="Describe the issue..."></textarea>
            </div>
            <div class="input-group">
                <label>Attach Photo</label>
                <input type="file" id="defect-photo" accept="image/*" capture="environment">
                <p id="compressing-msg" style="display: none; color: var(--accent-color); font-size: 0.8rem; margin-top: 5px;">Compressing photo...</p>
                <img id="preview-img" alt="Preview">
            </div>
            <div style="display: flex; gap: 15px; margin-top: 10px;">
                <button id="save-defect-btn" class="success">Save Report</button>
                <button id="cancel-defect-btn" class="danger">Cancel</button>
            </div>
        </div>
    </div>

    <!-- View Detail Modal -->
    <div id="detail-modal" class="defect-modal">
        <div class="modal-content neu-raised" style="padding: 30px;">
            <h3>Defect Detail</h3>
            <div style="margin: 20px 0;">
                <p style="margin-bottom: 10px;"><strong style="color: var(--text-color);">Status:</strong> <span id="detail-status" style="color: var(--accent-color);"></span></p>
                <p><strong style="color: var(--text-color);">Description:</strong> <span id="detail-desc"></span></p>
            </div>
            <div id="detail-photo-container">
                <img id="detail-img" style="max-width: 100%; margin-top: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.4);" alt="Defect Photo">
            </div>
            <button id="close-detail-btn" class="primary" style="margin-top: 25px;">Close Detail</button>
        </div>
    </div>

    <div id="global-loader" class="global-loader">
        <div class="spinner"></div>
        <p id="loader-text">Loading...</p>
    </div>

    <script src="libs/idb.js"></script>
    <script src="config.js"></script>
    <script src="defect-logic.js?v=1.2.6"></script>
    <div style="position: fixed; bottom: 10px; right: 15px; font-size: 0.7rem; color: var(--text-muted); opacity: 0.5; z-index: 10000;">v1.5.2</div>
</body>
</html>
